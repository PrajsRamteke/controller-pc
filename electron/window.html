<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'unsafe-inline'" />
  <title>PAD//LINK</title>
  <style>
    :root {
      --bg: #0d1017;
      --surface: #171c26;
      --surface-hi: #212837;
      --edge: #2c3546;
      --ink: #eef1f6;
      --dim: #8892a3;
      --faint: #3d475c;
      --link: #57c8ff;
      --link-rgb: 87, 200, 255;
      --warn: #ff5d5d;
      --amber: #ffb020;
      --p1: #57c8ff; --p2: #79d055; --p3: #ffcb2e; --p4: #ff5347;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, "SF Pro Display", "Segoe UI", Roboto, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      padding: 20px 22px 16px;
      gap: 14px;
      user-select: none;
      overflow: hidden;
    }
    header { display: flex; align-items: center; justify-content: space-between; }
    .wordmark { font-weight: 800; font-size: 17px; letter-spacing: 2px; }
    .wordmark .slash { color: var(--link); }
    .badge {
      font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
      padding: 4px 10px; border-radius: 999px;
      border: 1px solid var(--edge); color: var(--dim); background: var(--surface);
    }
    .badge.keys { border-color: rgba(var(--link-rgb), .5); color: var(--link); }
    .badge.gamepad { border-color: var(--amber); color: var(--amber); }

    .qr-card {
      background: #fff; border-radius: 18px; padding: 14px;
      display: flex; align-items: center; justify-content: center;
      aspect-ratio: 1 / 1; max-height: 46vh;
      margin: 0 auto; width: min(100%, 46vh);
      box-shadow: 0 0 0 1px var(--edge), 0 0 44px rgba(var(--link-rgb), .13);
    }
    .qr-card img { width: 100%; height: 100%; image-rendering: pixelated; }
    .qr-card .waiting { color: #8892a3; font-size: 13px; text-align: center; padding: 20px; }

    .hint { text-align: center; color: var(--dim); font-size: 12.5px; }
    .hint b { color: var(--ink); font-weight: 600; }

    .url-row {
      display: flex; align-items: stretch; gap: 8px; justify-content: center;
    }
    .url-pill {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--edge); border-radius: 12px;
      padding: 10px 14px; cursor: pointer; min-width: 0;
      transition: border-color .15s, background .15s;
    }
    .url-pill:hover { border-color: rgba(var(--link-rgb), .6); background: var(--surface-hi); }
    .url-pill .url {
      font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
      font-size: 15px; font-weight: 600; color: var(--link);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .url-pill .copy-hint { font-size: 11px; color: var(--faint); flex: none; letter-spacing: .5px; }
    .url-pill.copied .copy-hint { color: var(--p2); }
    .icon-btn {
      flex: none; width: 42px; border: 1px solid var(--edge); border-radius: 12px;
      background: var(--surface); color: var(--dim); font-size: 16px; cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .icon-btn:hover { border-color: rgba(var(--link-rgb), .6); color: var(--link); }

    .endpoints { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
    .endpoints button {
      font-size: 11px; font-weight: 600; letter-spacing: .5px;
      padding: 5px 12px; border-radius: 999px; cursor: pointer;
      background: var(--surface); border: 1px solid var(--edge); color: var(--dim);
    }
    .endpoints button.active { border-color: rgba(var(--link-rgb), .7); color: var(--link); }
    .endpoints.single { display: none; }

    .players { display: flex; gap: 10px; justify-content: center; }
    .pslot {
      flex: 1; max-width: 86px; text-align: center;
      border: 1px solid var(--edge); border-radius: 12px; padding: 8px 0 7px;
      background: var(--surface); color: var(--faint);
      font-size: 12px; font-weight: 700; letter-spacing: 1px;
      transition: all .2s;
    }
    .pslot .dot {
      display: block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--faint); margin: 0 auto 5px;
    }
    .pslot.on { color: var(--ink); background: var(--surface-hi); }
    .pslot.on .dot { box-shadow: 0 0 8px 1px var(--pc); background: var(--pc); }
    .pslot.on { border-color: var(--pc); }

    footer {
      margin-top: auto; display: flex; align-items: center; justify-content: space-between;
      color: var(--faint); font-size: 11.5px;
    }
    footer .note { flex: 1; }
    footer button {
      background: none; border: none; color: var(--dim); font-size: 11.5px;
      cursor: pointer; text-decoration: underline; text-underline-offset: 2px;
    }
    footer button:hover { color: var(--link); }

    .error {
      display: none; background: rgba(255, 93, 93, .1); border: 1px solid var(--warn);
      color: var(--warn); border-radius: 12px; padding: 10px 14px; font-size: 12.5px;
      text-align: center;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <header>
    <div class="wordmark">PAD<span class="slash">//</span>LINK</div>
    <div class="badge" id="mode">STARTING…</div>
  </header>

  <div class="error" id="error"></div>

  <div class="qr-card" id="qrCard">
    <div class="waiting" id="qrWaiting">Waiting for network…</div>
    <img id="qrImg" alt="QR code" hidden />
  </div>

  <div class="hint">Scan with your phone camera — <b>same Wi-Fi</b> — then rotate to landscape</div>

  <div class="url-row">
    <div class="url-pill" id="urlPill" title="Click to copy">
      <span class="url" id="urlText">http://…</span>
      <span class="copy-hint" id="copyHint">COPY</span>
    </div>
    <button class="icon-btn" id="openBtn" title="Open in browser">↗</button>
  </div>

  <div class="endpoints single" id="endpoints"></div>

  <div class="players" id="players">
    <div class="pslot" style="--pc: var(--p1)"><span class="dot"></span>P1</div>
    <div class="pslot" style="--pc: var(--p2)"><span class="dot"></span>P2</div>
    <div class="pslot" style="--pc: var(--p3)"><span class="dot"></span>P3</div>
    <div class="pslot" style="--pc: var(--p4)"><span class="dot"></span>P4</div>
  </div>

  <footer>
    <span class="note" id="permNote"></span>
    <button id="mappingBtn">edit mapping</button>
  </footer>

  <script src="./renderer.js"></script>
</body>
</html>
