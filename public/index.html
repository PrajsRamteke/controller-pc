<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1017">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon.svg">
<title>PAD//LINK</title>
<style>
  :root{
    --bg:#0d1017;
    --surface:#171c26;
    --surface-hi:#212837;
    --edge:#2c3546;
    --ink:#eef1f6;
    --dim:#8892a3;
    --faint:#3d475c;
    --link:#57c8ff;          /* light-bar: linked */
    --link-rgb:87,200,255;
    --warn:#ff5d5d;          /* light-bar: lost */
    --a:#79d055; --b:#ff5347; --x:#5b86ff; --y:#ffcb2e;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:none}
  html,body{width:100%;height:100%;overflow:hidden;overscroll-behavior:none}
  body{
    background:
      radial-gradient(140vmax 70vmax at 50% 135%, #131926 0%, var(--bg) 55%),
      var(--bg);
    color:var(--ink);
    font-family:-apple-system,"SF Pro Display","Segoe UI",Roboto,system-ui,sans-serif;
    position:fixed;inset:0;
  }

  /* ---- portrait rotate hint ---- */
  #rotate{
    position:fixed;inset:0;z-index:100;display:none;
    background:var(--bg);
    flex-direction:column;align-items:center;justify-content:center;gap:14px;
    text-align:center;padding:24px;
  }
  #rotate .ico{font-size:44px;animation:tilt 1.6s ease-in-out infinite}
  @keyframes tilt{0%,100%{transform:rotate(0)}50%{transform:rotate(-90deg)}}
  @media (orientation:portrait){ #rotate{display:flex} }
  @media (prefers-reduced-motion:reduce){ #rotate .ico{animation:none} *{animation:none!important;transition:none!important} }

  #pad{position:absolute;inset:0;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
  .abs{position:absolute}

  /* ---- HUD ---- */
  #hud{
    position:absolute;left:50%;top:2.5%;transform:translateX(-50%);z-index:10;
    display:flex;align-items:center;gap:12px;
    background:rgba(23,28,38,.85);border:1px solid var(--edge);border-radius:99px;
    padding:5px 8px 5px 16px;backdrop-filter:blur(10px);
    font-size:11px;letter-spacing:.14em;font-weight:700;color:var(--dim);
    text-transform:uppercase;
  }
  #dot{width:8px;height:8px;border-radius:50%;background:var(--warn);box-shadow:0 0 8px var(--warn);transition:background .3s,box-shadow .3s}
  body.linked #dot{background:var(--link);box-shadow:0 0 10px var(--link)}
  #lat{color:var(--ink);font-variant-numeric:tabular-nums;min-width:52px;text-align:right}
  #mode{color:var(--faint);border-left:1px solid var(--edge);padding-left:12px}
  #mode.gp{color:var(--link)}
  #fsBtn,#setBtn{
    display:flex;align-items:center;justify-content:center;
    width:30px;height:30px;border-radius:50%;
    background:var(--surface-hi);border:1px solid var(--edge);color:var(--dim);
    font-size:14px;
  }
  #fsBtn.down,#setBtn.down{color:var(--link);border-color:var(--link)}

  #toast{
    position:absolute;left:50%;bottom:8%;transform:translateX(-50%) translateY(20px);z-index:20;
    background:rgba(23,28,38,.95);border:1px solid var(--edge);border-radius:12px;
    padding:10px 18px;font-size:12px;color:var(--ink);letter-spacing:.02em;
    opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;max-width:80%;text-align:center;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---- generic round button ---- */
  .btn{
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    border-radius:50%;
    background:linear-gradient(180deg,var(--surface-hi),var(--surface));
    border:1px solid var(--edge);
    box-shadow:0 4px 10px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.05);
    color:var(--ink);
    font-weight:800;letter-spacing:.04em;
    transition:transform .05s ease, box-shadow .08s ease, border-color .08s ease;
  }
  .btn.down{transform:scale(.92)}
  .key{
    font-size:8px;font-weight:700;color:var(--faint);letter-spacing:.1em;
    text-transform:uppercase;white-space:nowrap;pointer-events:none;
  }
  .btn.down .key{color:var(--dim)}

  /* triggers & bumpers — every control size scales with its --sz (layout editor) */
  .trig{width:calc(17vmin * var(--sz,1));height:calc(17vmin * var(--sz,1));font-size:calc(4.4vmin * var(--sz,1))}
  .bump{width:calc(13vmin * var(--sz,1));height:calc(13vmin * var(--sz,1));font-size:calc(3.6vmin * var(--sz,1))}
  .trig.down,.bump.down{box-shadow:0 0 22px rgba(var(--link-rgb),.45), inset 0 1px 0 rgba(255,255,255,.05);border-color:var(--link)}

  /* ABXY face buttons */
  .face{width:calc(14.5vmin * var(--sz,1));height:calc(14.5vmin * var(--sz,1))}
  .face .cap{font-size:calc(6vmin * var(--sz,1));font-weight:900;line-height:1}
  .face[data-k="A"] .cap{color:var(--a)} .face[data-k="B"] .cap{color:var(--b)}
  .face[data-k="X"] .cap{color:var(--x)} .face[data-k="Y"] .cap{color:var(--y)}
  .face[data-k="A"].down{box-shadow:0 0 22px rgba(121,208,85,.55);border-color:var(--a)}
  .face[data-k="B"].down{box-shadow:0 0 22px rgba(255,83,71,.55);border-color:var(--b)}
  .face[data-k="X"].down{box-shadow:0 0 22px rgba(91,134,255,.55);border-color:var(--x)}
  .face[data-k="Y"].down{box-shadow:0 0 22px rgba(255,203,46,.55);border-color:var(--y)}

  /* d-pad — diamond of round buttons, mirrors the ABXY cluster */
  .dbtn{width:calc(14.5vmin * var(--sz,1));height:calc(14.5vmin * var(--sz,1))}
  .dbtn .cap{font-size:calc(5vmin * var(--sz,1));line-height:1;color:var(--dim)}
  .dbtn.down{border-color:var(--link);box-shadow:0 0 22px rgba(var(--link-rgb),.5)}
  .dbtn.down .cap{color:var(--link)}

  /* ---- analog sticks ---- */
  .stick{
    width:calc(30vmin * var(--sz,1));height:calc(30vmin * var(--sz,1));border-radius:50%;
    background:radial-gradient(circle at 50% 40%, #1b2130, #11151e 70%);
    border:1px solid var(--edge);
    box-shadow:inset 0 6px 18px rgba(0,0,0,.7), 0 2px 8px rgba(0,0,0,.5);
    position:absolute;
  }
  .stick .ring{
    position:absolute;inset:-3px;border-radius:50%;pointer-events:none;
    background:conic-gradient(from var(--ang,0deg), rgba(var(--link-rgb),var(--glow,0)) 0deg 60deg, transparent 90deg 360deg);
    -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 4px));
            mask:radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 4px));
  }
  .stick .thumb{
    position:absolute;width:56%;height:56%;left:22%;top:22%;border-radius:50%;
    background:radial-gradient(circle at 50% 32%, #333b4d, #1d2230 65%), #1d2230;
    border:1px solid #3d475c;
    box-shadow:0 8px 16px rgba(0,0,0,.65), inset 0 2px 3px rgba(255,255,255,.08);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    color:#5b6577;font-size:9px;font-weight:800;letter-spacing:.2em;
  }
  .stick .thumb .key{font-size:7px;letter-spacing:.15em}
  .stick.active .thumb{border-color:var(--link);color:var(--link)}

  /* ---- PS5-style touchpad (signature) ---- */
  #touchpad{
    left:32%;top:13%;width:calc(36% * var(--sz,1));height:calc(42% * var(--sz,1));
    border-radius:18px;
    background:
      radial-gradient(circle at 50% 0%, rgba(255,255,255,.03), transparent 60%),
      linear-gradient(180deg,#141926,#10141d);
    border:1px solid var(--edge);
    box-shadow:inset 0 2px 10px rgba(0,0,0,.5);
    overflow:hidden;
  }
  /* the light bar — connection status, like a real DualSense */
  #touchpad::before{
    content:"";position:absolute;inset:0;border-radius:18px;pointer-events:none;
    border:2px solid var(--lb,#ffb020);
    box-shadow:0 0 16px var(--lb,#ffb020), inset 0 0 12px rgba(0,0,0,.4);
    opacity:.9;transition:border-color .4s, box-shadow .4s;
  }
  body.linking #touchpad::before{--lb:rgba(var(--link-rgb),.9);animation:lbpulse 1.4s ease-in-out infinite}
  body.linked  #touchpad::before{--lb:var(--link);animation:none}
  body.lost    #touchpad::before{--lb:var(--warn);animation:lbpulse 1s ease-in-out infinite}
  @keyframes lbpulse{0%,100%{opacity:.25}50%{opacity:.95}}

  /* trackpad dot texture */
  #touchpad .grid{
    position:absolute;inset:10px;pointer-events:none;opacity:.5;
    background-image:radial-gradient(circle, var(--faint) 1px, transparent 1.4px);
    background-size:16px 16px;
    -webkit-mask:radial-gradient(closest-side at 50% 50%, #000 60%, transparent 100%);
            mask:radial-gradient(closest-side at 50% 50%, #000 60%, transparent 100%);
  }
  #touchpad .lbl{
    position:absolute;left:0;right:0;bottom:8px;text-align:center;pointer-events:none;
    font-size:8px;font-weight:800;letter-spacing:.3em;color:var(--faint);text-transform:uppercase;
  }
  #touchpad.touching{background:linear-gradient(180deg,#182031,#131824)}
  .ripple{
    position:absolute;width:44px;height:44px;border-radius:50%;pointer-events:none;
    border:2px solid rgba(var(--link-rgb),.8);
    transform:translate(-50%,-50%) scale(.3);opacity:1;
    animation:rip .45s ease-out forwards;
  }
  @keyframes rip{to{transform:translate(-50%,-50%) scale(1.6);opacity:0}}
  .fdot{
    position:absolute;width:26px;height:26px;border-radius:50%;pointer-events:none;
    background:radial-gradient(circle, rgba(var(--link-rgb),.35), transparent 70%);
    transform:translate(-50%,-50%);
  }

  /* ---- center cluster ---- */
  .pill{width:calc(9.5vmin * var(--sz,1));height:calc(9.5vmin * var(--sz,1));color:var(--dim)}
  .pill .cap{font-size:calc(3.2vmin * var(--sz,1));line-height:1}
  .pill .capSm{font-size:calc(2.6vmin * var(--sz,1));line-height:1}
  .pill.down{color:var(--link);border-color:var(--link);box-shadow:0 0 18px rgba(var(--link-rgb),.35)}

  .tag{
    position:absolute;font-size:9px;font-weight:800;letter-spacing:.22em;
    color:var(--faint);text-transform:uppercase;pointer-events:none;
  }

  /* ---- settings panel ---- */
  #settings{
    position:fixed;inset:0;z-index:50;display:none;
    align-items:center;justify-content:center;
    background:rgba(6,8,12,.7);backdrop-filter:blur(6px);
  }
  #settings.open{display:flex}
  #settings .panel{
    width:min(420px, 86vw);
    background:var(--surface);border:1px solid var(--edge);border-radius:18px;
    padding:18px 20px;box-shadow:0 20px 60px rgba(0,0,0,.6);
  }
  #settings .ptitle{
    display:flex;align-items:center;justify-content:space-between;
    font-size:12px;font-weight:800;letter-spacing:.2em;color:var(--ink);
    text-transform:uppercase;margin-bottom:16px;
  }
  #setClose{
    width:32px;height:32px;border-radius:50%;border:1px solid var(--edge);
    background:var(--surface-hi);color:var(--dim);font-size:14px;
  }
  #settings .row{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 0;font-size:14px;color:var(--ink);font-weight:600;
    border-bottom:1px solid var(--edge);
  }
  #settings .row .hint{display:block;font-size:11px;color:var(--dim);font-weight:400;margin-top:2px}
  /* toggle switch */
  .switch{position:relative;width:46px;height:26px;flex:none}
  .switch input{position:absolute;opacity:0;width:100%;height:100%;margin:0}
  .switch .knob{
    position:absolute;inset:0;border-radius:99px;background:var(--surface-hi);
    border:1px solid var(--edge);transition:background .2s,border-color .2s;
  }
  .switch .knob::after{
    content:"";position:absolute;width:20px;height:20px;border-radius:50%;
    top:2px;left:2px;background:var(--dim);transition:transform .2s,background .2s;
  }
  .switch input:checked + .knob{background:rgba(var(--link-rgb),.25);border-color:var(--link)}
  .switch input:checked + .knob::after{transform:translateX(20px);background:var(--link)}
  .prow{
    display:block;width:100%;margin-top:12px;padding:13px;
    border-radius:12px;border:1px solid var(--edge);
    background:var(--surface-hi);color:var(--ink);
    font-size:13px;font-weight:700;letter-spacing:.06em;text-align:center;
  }
  .prow.danger{color:var(--warn);border-color:rgba(255,93,93,.35);background:transparent}

  /* ---- layout edit mode ---- */
  #editbar{
    position:fixed;left:50%;bottom:calc(10px + env(safe-area-inset-bottom));transform:translateX(-50%);
    z-index:60;display:none;align-items:center;gap:12px;
    background:rgba(23,28,38,.95);border:1px solid var(--link);border-radius:16px;
    padding:10px 14px;box-shadow:0 10px 40px rgba(0,0,0,.6);
  }
  body.editing #editbar{display:flex}
  #editbar .who{font-size:11px;font-weight:800;letter-spacing:.12em;color:var(--link);min-width:74px;text-transform:uppercase}
  #editbar input[type=range]{width:150px;touch-action:auto;accent-color:var(--link)}
  #editbar button{
    padding:8px 12px;border-radius:10px;border:1px solid var(--edge);
    background:var(--surface-hi);color:var(--ink);font-size:11px;font-weight:800;letter-spacing:.08em;
    touch-action:auto;
  }
  #editbar #editDone{border-color:var(--link);color:var(--link)}
  body.editing #pad{
    background-image:
      linear-gradient(rgba(var(--link-rgb),.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(var(--link-rgb),.06) 1px, transparent 1px);
    background-size:24px 24px;
  }
  body.editing [data-cid]{outline:1px dashed rgba(var(--link-rgb),.55);outline-offset:3px;cursor:move}
  body.editing [data-cid].selected{outline:2px solid var(--link);outline-offset:3px}
  body.editing #hud, body.editing .tag{opacity:.25;pointer-events:none}
</style>
</head>
<body class="linking">

<div id="rotate">
  <div class="ico">📱</div>
  <div style="font-weight:800;letter-spacing:.1em">ROTATE TO LANDSCAPE</div>
  <div style="color:var(--dim);font-size:13px">PAD//LINK works in landscape only</div>
</div>

<div id="pad">
  <!-- HUD -->
  <div id="hud">
    <span id="dot"></span><span id="status">LINKING</span><span id="lat">— ms</span>
    <span id="mode">KEYS</span>
    <div id="setBtn" title="Settings">⚙</div>
    <div id="fsBtn" title="Fullscreen">⛶</div>
  </div>
  <div id="toast"></div>

  <!-- triggers / bumpers -->
  <div class="btn trig abs" data-k="LT" style="left:2.5%;top:4%"><span class="cap">LT</span></div>
  <div class="btn bump abs" data-k="LB" style="left:14.5%;top:26%"><span class="cap">LB</span></div>
  <div class="btn trig abs" data-k="RT" style="right:2.5%;top:4%"><span class="cap">RT</span></div>
  <div class="btn bump abs" data-k="RB" style="right:14.5%;top:26%"><span class="cap">RB</span></div>

  <!-- PS5-style touchpad -->
  <div id="touchpad" class="abs">
    <div class="grid"></div>
    <div class="lbl">Touchpad · tap = click · 2-finger = right / scroll</div>
  </div>

  <!-- view / menu flank the touchpad like create/options -->
  <div class="btn pill abs" data-k="VIEW" style="left:25.5%;top:14%"><span class="cap">⧉</span></div>
  <div class="btn pill abs" data-k="MENU" style="right:25.5%;top:14%"><span class="cap">≡</span></div>

  <!-- stick clicks under the touchpad -->
  <div class="btn pill abs" data-k="L3" style="left:calc(50% - 14.25vmin);top:60%"><span class="capSm">L3</span></div>
  <div class="btn pill abs" data-k="R3" style="left:calc(50% + 4.75vmin);top:60%"><span class="capSm">R3</span></div>

  <!-- d-pad diamond (mirrors ABXY) -->
  <div class="btn dbtn abs" data-k="DPAD_UP"    style="left:12.5%;top:40%"><span class="cap">▲</span></div>
  <div class="btn dbtn abs" data-k="DPAD_LEFT"  style="left:4%;top:56%"><span class="cap">◀</span></div>
  <div class="btn dbtn abs" data-k="DPAD_RIGHT" style="left:21%;top:56%"><span class="cap">▶</span></div>
  <div class="btn dbtn abs" data-k="DPAD_DOWN"  style="left:12.5%;top:72%"><span class="cap">▼</span></div>

  <!-- sticks -->
  <div class="stick" id="stickL" style="left:23%;bottom:4.5%">
    <div class="ring"></div><div class="thumb"><span>MOVE</span><span class="key" id="lstickKey"></span></div>
  </div>
  <div class="stick" id="stickR" style="right:23%;bottom:4.5%">
    <div class="ring"></div><div class="thumb"><span>LOOK</span><span class="key" id="rstickKey"></span></div>
  </div>

  <!-- ABXY -->
  <div class="btn face abs" data-k="Y" style="right:12.5%;top:40%"><span class="cap">Y</span></div>
  <div class="btn face abs" data-k="X" style="right:21%;top:56%"><span class="cap">X</span></div>
  <div class="btn face abs" data-k="B" style="right:4%;top:56%"><span class="cap">B</span></div>
  <div class="btn face abs" data-k="A" style="right:12.5%;top:72%"><span class="cap">A</span></div>

  <div class="tag" style="left:5%;bottom:3%">PAD//LINK</div>
</div>

<!-- settings panel -->
<div id="settings">
  <div class="panel">
    <div class="ptitle">Controller settings <button id="setClose">✕</button></div>
    <div class="row">
      <span>Vibration<span class="hint">Haptics on button press + game rumble</span></span>
      <label class="switch"><input type="checkbox" id="vibToggle" checked><span class="knob"></span></label>
    </div>
    <button class="prow" id="editLayout">✎ &nbsp;Edit layout — move &amp; resize any button</button>
    <button class="prow danger" id="resetLayout">Reset layout to default</button>
  </div>
</div>

<!-- layout edit toolbar -->
<div id="editbar">
  <span class="who" id="editWho">Tap a control</span>
  <input type="range" id="sizeSlider" min="0.6" max="1.8" step="0.05" value="1" disabled>
  <button id="editDone">Done</button>
</div>

<script>
(() => {
  // ---------- websocket ----------
  let ws, alive = false;
  const statusEl = document.getElementById("status");
  const latEl = document.getElementById("lat");
  const setLink = (state, label) => {
    document.body.classList.remove("linking","linked","lost");
    document.body.classList.add(state);
    statusEl.textContent = label;
  };

  function connect(){
    setLink("linking","LINKING");
    ws = new WebSocket(`ws://${location.host}`);
    ws.onopen = () => { alive = true; setLink("linked","LINKED"); buzz(30); };
    ws.onclose = () => { alive = false; setLink("lost","RETRY"); latEl.textContent = "— ms"; setTimeout(connect, 1200); };
    ws.onerror = () => ws.close();
    ws.onmessage = (e) => {
      try {
        const m = JSON.parse(e.data);
        if (m.t === "pong") latEl.textContent = (performance.now() - m.id).toFixed(0) + " ms";
        else if (m.t === "mode") {
          // gamepad mode = the browser extension is attached; keys are paused
          const modeEl = document.getElementById("mode");
          modeEl.textContent = m.g ? "GAMEPAD" : "KEYS";
          modeEl.classList.toggle("gp", !!m.g);
        }
        else if (m.t === "rumble") {
          // game rumble forwarded from the browser extension
          if (settings.vib && navigator.vibrate && (m.m ?? 1) > 0.05) navigator.vibrate(Math.min(1000, m.d || 100));
        }
      } catch {}
    };
  }
  connect();
  setInterval(() => { if (alive) ws.send(JSON.stringify({t:"ping", id: performance.now()})); }, 2000);

  const send = (o) => { if (alive) ws.send(JSON.stringify(o)); };

  // ---------- user settings ----------
  const settings = { vib: localStorage.getItem("padlink-vib") !== "0" };
  const EDIT = { on: false, sel: null };   // layout edit mode
  const buzz = (ms=12) => { if (settings.vib && navigator.vibrate) navigator.vibrate(ms); };

  // ---------- toast ----------
  const toastEl = document.getElementById("toast");
  let toastTimer;
  function toast(msg, ms=3500){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), ms);
  }

  // ---------- fullscreen ----------
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const inStandalone = window.matchMedia("(display-mode: fullscreen), (display-mode: standalone)").matches
                       || navigator.standalone === true;
  async function goFullscreen(){
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen;
    if (req) {
      try { await req.call(el, {navigationUI:"hide"}); } catch {}
      try { await screen.orientation.lock("landscape"); } catch {}
      return true;
    }
    return false;
  }
  document.getElementById("fsBtn").addEventListener("pointerdown", async (e) => {
    e.stopPropagation();
    if (document.fullscreenElement || document.webkitFullscreenElement) {
      try { await (document.exitFullscreen || document.webkitExitFullscreen).call(document); } catch {}
      return;
    }
    const ok = await goFullscreen();
    if (!ok && isIOS && !inStandalone) {
      toast("For fullscreen on iPhone: Share → Add to Home Screen, then open PAD//LINK from your home screen");
    }
  });

  // auto fullscreen + wake lock on first touch
  let booted = false;
  document.body.addEventListener("pointerdown", async () => {
    if (booted) return; booted = true;
    if (!inStandalone) await goFullscreen();
    try { await navigator.wakeLock.request("screen"); } catch {}
    if (isIOS && !inStandalone) toast("Tip: Add to Home Screen for true fullscreen", 4000);
  }, {capture:true});
  // re-acquire wake lock when returning to the page
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) navigator.wakeLock?.request("screen").catch(() => {});
  });

  // ---------- key-cap labels from mapping.json ----------
  const KEYCAP = {
    Space:"space", Enter:"enter", Escape:"esc", Tab:"tab",
    LeftShift:"shift", LeftControl:"ctrl", LeftAlt:"opt", LeftCmd:"cmd",
    Backspace:"del", Up:"↑", Down:"↓", Left:"←", Right:"→",
  };
  const capOf = (n) => KEYCAP[n] || String(n).replace(/^Num/,"").toLowerCase();
  fetch("/mapping.json").then(r => r.json()).then(map => {
    for (const [btn, keyName] of Object.entries(map.buttons || {})) {
      const el = document.querySelector(`[data-k="${btn}"]`);
      if (!el || !keyName) continue;
      const tag = document.createElement("span");
      tag.className = "key";
      tag.textContent = capOf(keyName);
      el.appendChild(tag);
    }
    const ls = map.leftStick || {}, rs = map.rightStick || {};
    document.getElementById("lstickKey").textContent =
      ls.mode === "mouse" ? "mouse" : [ls.up,ls.left,ls.down,ls.right].filter(Boolean).join("").toLowerCase();
    document.getElementById("rstickKey").textContent =
      rs.mode === "mouse" ? "mouse" : [rs.up,rs.left,rs.down,rs.right].filter(Boolean).join("").toLowerCase();
  }).catch(() => {});

  // ---------- buttons (multi-touch safe) ----------
  document.querySelectorAll("[data-k]").forEach(el => {
    const k = el.dataset.k;
    const down = (e) => {
      if (EDIT.on) return;
      e.preventDefault();
      el.setPointerCapture(e.pointerId);
      el.classList.add("down");
      send({t:"b", k, v:1});
      buzz();
    };
    const up = () => {
      el.classList.remove("down");
      send({t:"b", k, v:0});
    };
    el.addEventListener("pointerdown", down);
    el.addEventListener("pointerup", up);
    el.addEventListener("pointercancel", up);
    el.addEventListener("lostpointercapture", up);
  });

  // ---------- PS5-style touchpad ----------
  const tp = document.getElementById("touchpad");
  {
    const fingers = new Map();   // pointerId -> {x, y, dot}
    let maxFingers = 0, startT = 0, travel = 0;
    let accX = 0, accY = 0, accScroll = 0, rafQueued = false;

    const flush = () => {
      rafQueued = false;
      if (accX || accY) { send({t:"m", x:+accX.toFixed(1), y:+accY.toFixed(1)}); accX = 0; accY = 0; }
      if (Math.abs(accScroll) >= 1) { send({t:"w", y:+accScroll.toFixed(1)}); accScroll = 0; }
    };
    const queue = () => { if (!rafQueued) { rafQueued = true; requestAnimationFrame(flush); } };

    tp.addEventListener("pointerdown", (e) => {
      if (EDIT.on) return;
      e.preventDefault();
      tp.setPointerCapture(e.pointerId);
      const r = tp.getBoundingClientRect();
      const dot = document.createElement("div");
      dot.className = "fdot";
      dot.style.left = (e.clientX - r.left) + "px";
      dot.style.top = (e.clientY - r.top) + "px";
      tp.appendChild(dot);
      fingers.set(e.pointerId, {x: e.clientX, y: e.clientY, dot});
      if (fingers.size === 1) { maxFingers = 1; startT = performance.now(); travel = 0; }
      maxFingers = Math.max(maxFingers, fingers.size);
      tp.classList.add("touching");
      buzz(6);
    });

    tp.addEventListener("pointermove", (e) => {
      const f = fingers.get(e.pointerId);
      if (!f) return;
      const dx = e.clientX - f.x, dy = e.clientY - f.y;
      f.x = e.clientX; f.y = e.clientY;
      const r = tp.getBoundingClientRect();
      f.dot.style.left = (e.clientX - r.left) + "px";
      f.dot.style.top = (e.clientY - r.top) + "px";
      travel += Math.hypot(dx, dy);
      if (fingers.size >= 2) {
        // two-finger drag = scroll (use half of combined movement)
        accScroll += dy / fingers.size;
      } else {
        accX += dx; accY += dy;
      }
      queue();
    });

    const lift = (e) => {
      const f = fingers.get(e.pointerId);
      if (!f) return;
      f.dot.remove();
      fingers.delete(e.pointerId);
      if (fingers.size === 0) {
        tp.classList.remove("touching");
        const quick = performance.now() - startT < 250 && travel < 14;
        if (quick) {
          const right = maxFingers >= 2;
          send({t:"c", b: right ? "right" : "left"});
          buzz(right ? 18 : 10);
          const r = tp.getBoundingClientRect();
          const rip = document.createElement("div");
          rip.className = "ripple";
          rip.style.left = (e.clientX - r.left) + "px";
          rip.style.top = (e.clientY - r.top) + "px";
          if (right) rip.style.borderColor = "rgba(255,203,46,.8)";
          tp.appendChild(rip);
          setTimeout(() => rip.remove(), 500);
        }
        maxFingers = 0;
      }
    };
    tp.addEventListener("pointerup", lift);
    tp.addEventListener("pointercancel", lift);
  }

  // ---------- analog sticks ----------
  function makeStick(el, id){
    const thumb = el.querySelector(".thumb");
    const ring = el.querySelector(".ring");
    let pid = null, cx = 0, cy = 0, radius = 1;
    let lastSent = 0, lx = 0, ly = 0;

    const measure = () => {
      const r = el.getBoundingClientRect();
      cx = r.left + r.width/2; cy = r.top + r.height/2;
      radius = r.width/2 * 0.72;
    };

    const apply = (x, y) => {
      thumb.style.transform = `translate(${x*radius}px, ${y*radius}px)`;
      const mag = Math.hypot(x, y);
      ring.style.setProperty("--glow", Math.min(1, mag).toFixed(2));
      ring.style.setProperty("--ang", (Math.atan2(y, x)*180/Math.PI + 60) + "deg");
      const now = performance.now();
      if (now - lastSent > 33 || (x===0 && y===0)) {
        if (x !== lx || y !== ly) { send({t:"s", s:id, x:+x.toFixed(3), y:+y.toFixed(3)}); lx=x; ly=y; }
        lastSent = now;
      }
    };

    el.addEventListener("pointerdown", (e) => {
      if (EDIT.on) return;
      e.preventDefault();
      if (pid !== null) return;
      pid = e.pointerId;
      el.setPointerCapture(pid);
      el.classList.add("active");
      measure();
      move(e);
      buzz(8);
    });

    const move = (e) => {
      if (e.pointerId !== pid) return;
      let dx = (e.clientX - cx) / radius;
      let dy = (e.clientY - cy) / radius;
      const mag = Math.hypot(dx, dy);
      if (mag > 1) { dx /= mag; dy /= mag; }
      apply(dx, dy);
    };

    const end = (e) => {
      if (e.pointerId !== pid) return;
      pid = null;
      el.classList.remove("active");
      apply(0, 0);
      send({t:"s", s:id, x:0, y:0});
    };

    el.addEventListener("pointermove", move);
    el.addEventListener("pointerup", end);
    el.addEventListener("pointercancel", end);
  }

  makeStick(document.getElementById("stickL"), "L");
  makeStick(document.getElementById("stickR"), "R");

  const releaseAll = () => {
    send({t:"s", s:"L", x:0, y:0});
    send({t:"s", s:"R", x:0, y:0});
    document.querySelectorAll("[data-k].down").forEach(el => {
      el.classList.remove("down");
      send({t:"b", k: el.dataset.k, v:0});
    });
  };

  // release all inputs if page hidden (call/app switch) — no stuck keys
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) releaseAll();
  });

  // ---------- settings panel ----------
  const settingsEl = document.getElementById("settings");
  const vibToggle = document.getElementById("vibToggle");
  vibToggle.checked = settings.vib;
  vibToggle.addEventListener("change", () => {
    settings.vib = vibToggle.checked;
    localStorage.setItem("padlink-vib", settings.vib ? "1" : "0");
    buzz(25);
  });
  document.getElementById("setBtn").addEventListener("pointerdown", (e) => {
    e.stopPropagation();
    settingsEl.classList.add("open");
  });
  document.getElementById("setClose").addEventListener("click", () => settingsEl.classList.remove("open"));
  settingsEl.addEventListener("pointerdown", (e) => {
    if (e.target === settingsEl) settingsEl.classList.remove("open");
  });
  document.getElementById("resetLayout").addEventListener("click", () => {
    localStorage.removeItem(LAYOUT_KEY);
    location.reload();
  });

  // ---------- layout editor (move + resize every control) ----------
  const LAYOUT_KEY = "padlink-layout-v1";
  let layout = {};
  try { layout = JSON.parse(localStorage.getItem(LAYOUT_KEY)) || {}; } catch {}
  const saveLayout = () => localStorage.setItem(LAYOUT_KEY, JSON.stringify(layout));

  const padEl = document.getElementById("pad");
  const editables = [
    ...document.querySelectorAll("[data-k]"),
    document.getElementById("stickL"),
    document.getElementById("stickR"),
    document.getElementById("touchpad"),
  ];
  editables.forEach(el => { el.dataset.cid = el.dataset.k || el.id; });
  const NICE = { stickL: "L Stick", stickR: "R Stick", touchpad: "Touchpad" };

  // apply saved layout on load
  for (const el of editables) {
    const c = layout[el.dataset.cid];
    if (!c) continue;
    if (c.x != null) {
      el.style.left = c.x + "%"; el.style.top = c.y + "%";
      el.style.right = "auto"; el.style.bottom = "auto";
    }
    if (c.s) el.style.setProperty("--sz", c.s);
  }

  const editWho = document.getElementById("editWho");
  const sizeSlider = document.getElementById("sizeSlider");

  document.getElementById("editLayout").addEventListener("click", () => {
    settingsEl.classList.remove("open");
    EDIT.on = true;
    document.body.classList.add("editing");
    releaseAll();
    toast("Drag to move · tap to select · slider resizes", 4500);
  });
  document.getElementById("editDone").addEventListener("click", () => {
    EDIT.on = false;
    document.body.classList.remove("editing");
    if (EDIT.sel) EDIT.sel.classList.remove("selected");
    EDIT.sel = null;
    sizeSlider.disabled = true;
    editWho.textContent = "Tap a control";
    saveLayout();
    toast("Layout saved", 1800);
  });

  function selectControl(el) {
    if (EDIT.sel) EDIT.sel.classList.remove("selected");
    EDIT.sel = el;
    el.classList.add("selected");
    const cid = el.dataset.cid;
    editWho.textContent = NICE[cid] || cid.replace(/_/g, " ");
    sizeSlider.disabled = false;
    sizeSlider.value = layout[cid]?.s || 1;
  }

  sizeSlider.addEventListener("input", () => {
    if (!EDIT.sel) return;
    const cid = EDIT.sel.dataset.cid;
    const s = +sizeSlider.value;
    EDIT.sel.style.setProperty("--sz", s);
    layout[cid] = { ...layout[cid], s };
    saveLayout();
  });

  editables.forEach(el => {
    el.addEventListener("pointerdown", (e) => {
      if (!EDIT.on) return;
      e.preventDefault();
      selectControl(el);
      const padR = padEl.getBoundingClientRect();
      const r = el.getBoundingClientRect();
      const offX = e.clientX - r.left, offY = e.clientY - r.top;
      const pid = e.pointerId;
      let moved = false;
      el.setPointerCapture(pid);
      const move = (ev) => {
        if (ev.pointerId !== pid) return;
        moved = true;
        let x = ev.clientX - offX - padR.left;
        let y = ev.clientY - offY - padR.top;
        x = Math.max(0, Math.min(padR.width - r.width, x));
        y = Math.max(0, Math.min(padR.height - r.height, y));
        el.style.left = (x / padR.width * 100).toFixed(2) + "%";
        el.style.top = (y / padR.height * 100).toFixed(2) + "%";
        el.style.right = "auto"; el.style.bottom = "auto";
      };
      const up = (ev) => {
        if (ev.pointerId !== pid) return;
        el.removeEventListener("pointermove", move);
        el.removeEventListener("pointerup", up);
        el.removeEventListener("pointercancel", up);
        if (moved) {
          const cid = el.dataset.cid;
          layout[cid] = { ...layout[cid], x: parseFloat(el.style.left), y: parseFloat(el.style.top) };
          saveLayout();
        }
      };
      el.addEventListener("pointermove", move);
      el.addEventListener("pointerup", up);
      el.addEventListener("pointercancel", up);
    });
  });
})();
</script>
</body>
</html>
